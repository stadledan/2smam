<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>2. SA – Lerntrainer</title>
<style>
  :root {
    --bg: linear-gradient(160deg, #faf8f4 0%, #f0ece3 100%);
    --card: #ffffff;
    --border: #e8e4de;
    --text: #1a1a1a;
    --muted: #888;
    --ok: #2a6e4e;
    --ok-bg: #e8f5ed;
    --err: #c44;
    --err-bg: #fce8e4;
    --blue: #2a4a6e;
    --blue-bg: #eef3fa;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Segoe UI',system-ui,-apple-system,sans-serif; background:var(--bg); min-height:100vh; color:var(--text); line-height:1.5; }
  .container { max-width:620px; margin:0 auto; padding:20px 16px 80px; }

  .btn { border:none; border-radius:10px; font-weight:700; cursor:pointer; font-size:.95em; transition:all .15s; font-family:inherit; }
  .btn-primary { background:var(--blue); color:white; padding:12px 28px; }
  .btn-primary:disabled { background:#ccc; cursor:default; }
  .btn-full { width:100%; padding:14px; border-radius:12px; font-size:1.02em; box-shadow:0 3px 10px rgba(0,0,0,.1); }
  .btn-outline { background:white; color:var(--text); border:1.5px solid #d0ccc6; padding:13px; }

  /* MENU */
  .menu-header { text-align:center; padding:28px 16px 20px; }
  .menu-header .icon { font-size:2.2em; }
  .menu-header h1 { font-size:1.55em; font-weight:800; margin:6px 0 2px; }
  .menu-header p { color:#999; font-size:.86em; }
  .topic-list { display:flex; flex-direction:column; gap:8px; margin-top:12px; }
  .topic-btn { display:flex; align-items:center; gap:12px; padding:14px 16px; background:white; border:1.5px solid var(--border); border-radius:12px; cursor:pointer; font-size:.95em; text-align:left; transition:all .12s; box-shadow:0 1px 3px rgba(0,0,0,.04); font-family:inherit; color:var(--text); }
  .topic-btn:active { transform:scale(.98); }
  .topic-btn.mixed { background:linear-gradient(135deg,#1a1a1a,#333); color:white; border:none; box-shadow:0 4px 16px rgba(0,0,0,.12); }
  .topic-icon { width:40px; height:40px; border-radius:9px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:1.2em; }
  .topic-btn.mixed .topic-icon { background:rgba(255,255,255,.12); }
  .topic-label { font-weight:700; }
  .topic-desc { font-size:.78em; opacity:.55; margin-top:1px; }
  .topic-arrow { opacity:.3; font-size:1.2em; margin-left:auto; }
  .tip-box { margin-top:16px; padding:14px 16px; background:#fffcf4; border-radius:10px; border:1px solid #ede8df; font-size:.84em; color:#888; line-height:1.6; }

  /* THEORY CARD */
  .theory-card { background:white; border-radius:16px; padding:20px 18px; box-shadow:0 2px 14px rgba(0,0,0,.04); margin-bottom:14px; }
  .theory-card h2 { font-size:1.05em; font-weight:800; margin-bottom:12px; color:var(--blue); }
  .theory-section { margin-bottom:14px; }
  .theory-section:last-child { margin-bottom:0; }
  .theory-label { font-size:.8em; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:#aaa; margin-bottom:4px; }
  .formula-box { background:#fdf5e8; border-left:4px solid #b44a2f; border-radius:0 8px 8px 0; padding:10px 14px; font-size:1em; font-weight:600; margin:6px 0; line-height:1.7; }
  .rule-box { background:#eff7f2; border-left:4px solid #2a6e4e; border-radius:0 8px 8px 0; padding:10px 14px; font-size:.93em; line-height:1.6; margin:6px 0; }
  .example-box { background:#fafafa; border:1px solid #e8e4de; border-radius:8px; padding:12px 14px; font-size:.9em; line-height:1.7; margin:6px 0; }
  .example-box .ex-label { font-weight:700; color:#2a4a6e; margin-bottom:4px; font-size:.85em; }
  .warn-box { background:#fffbe6; border-left:4px solid #e0a800; border-radius:0 8px 8px 0; padding:10px 14px; font-size:.9em; margin:6px 0; }
  .casio-box { background:#eef3fa; border-left:4px solid #2a4a6e; border-radius:0 8px 8px 0; padding:10px 14px; font-size:.88em; line-height:1.6; margin:6px 0; font-family:monospace; }
  .green { color:var(--ok); font-weight:700; }
  .red { color:#b44a2f; font-weight:700; }

  /* QUIZ */
  .quiz-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; padding-bottom:10px; border-bottom:2px solid var(--border); }
  .quiz-back { background:none; border:none; font-size:1.3em; cursor:pointer; padding:2px 6px; color:var(--muted); }
  .quiz-info { text-align:center; }
  .quiz-topic { font-weight:800; font-size:.88em; }
  .quiz-progress-text { font-size:.76em; color:#aaa; }
  .quiz-score { background:#f0ece4; padding:5px 12px; border-radius:16px; font-size:.82em; font-weight:700; color:#666; }
  .progress-bar { height:5px; background:#e8e4de; border-radius:3px; margin-bottom:18px; overflow:hidden; }
  .progress-fill { height:100%; border-radius:3px; transition:width .3s; }
  .q-card { background:white; border-radius:16px; padding:20px 18px; box-shadow:0 2px 14px rgba(0,0,0,.04); }
  .q-text { font-size:1.05em; font-weight:600; margin-bottom:16px; line-height:1.55; }
  .mc-opts { display:flex; flex-direction:column; gap:8px; }
  .mc-opt { padding:11px 16px; text-align:left; border:2px solid #d0ccc6; border-radius:10px; background:white; color:var(--text); font-size:.95em; cursor:pointer; font-weight:400; transition:all .15s; font-family:inherit; width:100%; }
  .mc-opt.selected { background:var(--blue-bg); border-color:#2a4a8e; color:#1a3a6e; font-weight:700; }
  .mc-opt.correct { background:var(--ok-bg); border-color:var(--ok); color:#1a5e3e; }
  .mc-opt.wrong { background:var(--err-bg); border-color:var(--err); color:#922; }
  .mc-opt:disabled { cursor:default; }
  .mc-letter { font-weight:700; margin-right:8px; opacity:.4; }
  .calc-row { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .calc-input { padding:11px 14px; border:2px solid #d0ccc6; border-radius:10px; font-size:1.1em; font-family:monospace; width:150px; font-weight:700; outline:none; }
  .calc-input.correct { border-color:var(--ok); }
  .calc-input.wrong { border-color:var(--err); }
  .feedback { margin-top:14px; padding:14px 16px; border-radius:8px; border-left:4px solid; }
  .feedback.ok { background:var(--ok-bg); border-color:var(--ok); }
  .feedback.err { background:var(--err-bg); border-color:var(--err); }
  .feedback strong { display:block; margin-bottom:4px; }
  .feedback .expl { font-size:.92em; line-height:1.6; margin-top:6px; }
  .result-card { text-align:center; padding:32px 20px; background:white; border-radius:18px; box-shadow:0 2px 20px rgba(0,0,0,.05); }
  .result-emoji { font-size:2.8em; }
  .result-grade { font-size:1.6em; font-weight:800; margin:4px 0; }
  .result-pct { font-size:2.8em; font-weight:800; }
  .result-sub { color:var(--muted); font-size:.95em; }
  .result-bar { margin-top:20px; height:10px; background:#f0ece4; border-radius:5px; overflow:hidden; }
  .result-bar-fill { height:100%; border-radius:5px; transition:width .8s; }
  .result-dots { display:flex; gap:5px; justify-content:center; margin-top:16px; flex-wrap:wrap; }
  .result-dot { width:28px; height:28px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:.8em; }
  .result-dot.ok { background:var(--ok-bg); color:var(--ok); }
  .result-dot.err { background:var(--err-bg); color:var(--err); }
  .result-btns { display:flex; gap:8px; margin-top:20px; }
  .result-btns .btn { flex:1; padding:13px; }

  @media(max-width:400px) {
    .container { padding:14px 10px 60px; }
    .q-card,.theory-card { padding:16px 14px; }
  }
</style>
</head>
<body>
<div class="container" id="app"></div>
<script>

// ══════════════════════════════════════════════════════════
// THEORY CONTENT
// ══════════════════════════════════════════════════════════
const THEORY = {
  potenz: {
    title: "Potenz- & Wurzelfunktionen",
    sections: [
      { label:"Grundformel", content:`<div class="formula-box">f(x) = a · x<sup>n</sup>   mit  a ∈ ℝ\\{0},  n ∈ ℤ\\{0;1}</div>` },
      { label:"Welcher Graph – n entscheidet", content:`
        <div class="rule-box">
          <b>n gerade, positiv</b> (2, 4, 6…) → Parabel, <span class="green">Achsensymmetrie zur y-Achse</span><br>
          <b>n ungerade, positiv</b> (3, 5, 7…) → S-Kurve, <span class="green">Punktsymmetrie zum Ursprung</span><br>
          <b>n negativ, gerade</b> (−2, −4…) → Hyperbel, <span class="green">Achsensymmetrie</span>, D = ℝ\\{0}<br>
          <b>n negativ, ungerade</b> (−1, −3…) → Hyperbel, <span class="green">Punktsymmetrie</span>, D = ℝ\\{0}<br>
          <b>n = 1/2</b> → Wurzelparabel, D = [0; ∞)
        </div>` },
      { label:"Symmetrie prüfen – so geht's", content:`
        <div class="rule-box">
          Berechne f(−x) und vergleiche:<br>
          f(−x) = f(x) → <b>Achsensymmetrie</b><br>
          f(−x) = −f(x) → <b>Punktsymmetrie</b>
        </div>
        <div class="example-box"><div class="ex-label">Beispiel: f(x) = x⁻²</div>
          f(−x) = (−x)⁻² = x⁻² = f(x) → <span class="green">achsensymmetrisch ✓</span><br>
          Probe: f(3) = 1/9, f(−3) = 1/9 → gleich ✓
        </div>
        <div class="warn-box">⚠️ Eine addierte Konstante (z.B. +1) zerstört die Punktsymmetrie!</div>` },
      { label:"Hyperbel – wichtige Eigenschaften", content:`
        <div class="rule-box">
          • x = 0 ist verboten! → D = ℝ\\{0}<br>
          • x-Achse und y-Achse sind <b>Asymptoten</b><br>
          • Die Hyperbel f(x) = a·x<sup>n</sup> verläuft immer durch die Punkte <b>(1 | a)</b> und <b>(−1 | a)</b> (n gerade) oder <b>(−1 | −a)</b> (n ungerade)
        </div>` },
      { label:"Wurzelfunktion – Definitionsbereich", content:`
        <div class="formula-box">Unter der Wurzel ≥ 0 setzen → nach x auflösen</div>
        <div class="example-box"><div class="ex-label">Beispiel: f(x) = √(3x − 9)</div>
          3x − 9 ≥ 0  | +9<br>3x ≥ 9  | ÷3<br>x ≥ 3 → <span class="green">D = [3; ∞)</span>
        </div>` },
      { label:"Parameter a oder d aus Punkt bestimmen", content:`
        <div class="rule-box">
          1. Ansatz: f(x) = a · x<sup>n</sup> (oder + d)<br>
          2. Punkt (x₀ | y₀) einsetzen<br>
          3. Nach a (oder d) auflösen<br>
          4. Probe!
        </div>
        <div class="example-box"><div class="ex-label">Beispiel: f(x) = x⁻² + d, Punkt A(3 | 2)</div>
          f(3) = 2: &nbsp; 3⁻² + d = 2<br>
          1/9 + d = 2 &nbsp; | −1/9<br>
          <span class="green">d = 2 − 1/9 = 17/9 ≈ 1,89</span>
        </div>` },
    ]
  },
  quadr_fkt: {
    title: "Quadratische Funktionen aufstellen",
    sections: [
      { label:"Die Funktion", content:`<div class="formula-box">f(x) = ax² + bx + c   (a ≠ 0)</div>
        <div class="rule-box">
          a &gt; 0 → nach <b>oben</b> ↑ &nbsp;&nbsp; a &lt; 0 → nach <b>unten</b> ↓<br>
          c = y-Achsenabschnitt (f(0) = c)<br>
          b = 0 → Scheitel auf y-Achse
        </div>` },
      { label:"Scheitelpunkt berechnen", content:`
        <div class="formula-box">x<sub>S</sub> = −b / (2·a) &nbsp;&nbsp; dann &nbsp;&nbsp; y<sub>S</sub> = f(x<sub>S</sub>)</div>
        <div class="example-box"><div class="ex-label">Beispiel: f(x) = −x² + 4x + 11</div>
          x<sub>S</sub> = −4 / (2·(−1)) = −4 / −2 = <span class="green">2</span><br>
          y<sub>S</sub> = f(2) = −4 + 8 + 11 = <span class="green">15</span><br>
          → S(2 | 15)
        </div>
        <div class="warn-box">⚠️ Häufiger Fehler: Vorzeichen von b vergessen! b = +4 → x<sub>S</sub> = −4/(2·(−1)) = +2</div>` },
      { label:"Methode 1: Funktion aus 3 Punkten", content:`
        <div class="rule-box">
          1. Ansatz f(x) = ax² + bx + c aufschreiben<br>
          2. Jeden Punkt einsetzen → 3 Gleichungen<br>
          3. Casio: Mathe1 → 4735 → 3 Variablen<br>
          4. a, b, c ablesen → f(x) aufschreiben<br>
          5. <b>Probe!</b>
        </div>
        <div class="example-box"><div class="ex-label">Angabe | Bedingung | Gleichung</div>
          P₁(0 | 3): &nbsp; f(0) = 3 &nbsp; → &nbsp; c = 3<br>
          P₂(1 | 1): &nbsp; f(1) = 1 &nbsp; → &nbsp; a + b + c = 1<br>
          P₃(3 | 9): &nbsp; f(3) = 9 &nbsp; → &nbsp; 9a + 3b + c = 9
        </div>
        <div class="casio-box">Casio: Mathe1 → 4735 → 3 Var.<br>Zeile 1: 0 | 0 | 1 | 3<br>Zeile 2: 1 | 1 | 1 | 1<br>Zeile 3: 9 | 3 | 1 | 9<br>→ a = 2, b = −4, c = 3</div>` },
      { label:"Methode 2: Scheitel + Punkt", content:`
        <div class="rule-box">
          Trick: Spiegelpunkt!<br>
          x<sub>B</sub> = 2·x<sub>S</sub> − x<sub>A</sub> &nbsp;&nbsp; y<sub>B</sub> = y<sub>A</sub> (gleiche Höhe!)<br>
          → S, A, B bekannt → 3 Punkte → Casio
        </div>
        <div class="example-box"><div class="ex-label">Beispiel: S(2 | −9), A(5 | 0)</div>
          Spiegelpunkt: x<sub>B</sub> = 2·2 − 5 = −1 → B(−1 | 0)<br><br>
          f(5) = 0: &nbsp; 25a + 5b + c = 0<br>
          f(2) = −9: &nbsp; 4a + 2b + c = −9<br>
          f(−1) = 0: &nbsp; a − b + c = 0<br>
          → Casio: a = 1, b = −4, c = −5<br>
          → <span class="green">f(x) = x² − 4x − 5</span>
        </div>` },
      { label:"Scheitelpunktform ablesen (für die SA!)", content:`
        <div class="formula-box">f(x) = a · (x − d)² + e &nbsp; → &nbsp; Scheitel S(d | e)</div>
        <div class="warn-box">⚠️ ACHTUNG Vorzeichen: (x + 3)² → d = <b>−3</b> (Vorzeichen dreht sich!)</div>
        <div class="example-box"><div class="ex-label">Beispiel: f(x) = −¼·(x + 3)² − 1</div>
          a = −¼ &lt; 0 → nach <b>unten</b><br>
          d = <span class="red">−3</span> (weil +3 im Term, Vorzeichen dreht sich!)<br>
          e = −1<br>
          → Scheitel S(−3 | −1) &nbsp; <span class="green">→ Antwort C ✓</span>
        </div>` },
    ]
  },
  gleichungen: {
    title: "Quadratische Gleichungen lösen",
    sections: [
      { label:"Übersicht: Welcher Fall?", content:`
        <div class="rule-box">
          <b>Fall 1</b> – b = 0: &nbsp; ax² + c = 0 &nbsp; → &nbsp; x = ±√(−c/a)<br>
          <b>Fall 2</b> – c = 0: &nbsp; ax² + bx = 0 &nbsp; → &nbsp; Faktorisieren! &nbsp; x·(ax+b) = 0<br>
          <b>Fall 3</b> – a = 1: &nbsp; x² + px + q = 0 &nbsp; → &nbsp; p/q-Formel<br>
          <b>Fall 4</b> – a ≠ 1: &nbsp; ax² + bx + c = 0 &nbsp; → &nbsp; abc-Formel
        </div>
        <div class="warn-box">⚠️ Immer zuerst auf 0 bringen! &nbsp;&nbsp; Immer <b>L = { }</b> hinschreiben!</div>` },
      { label:"p/q-Formel (Fall 3 – a = 1)", content:`
        <div class="formula-box">x<sub>1,2</sub> = −p/2 ± √( (p/2)² − q )</div>
        <div class="formula-box">Diskriminante: D = (p/2)² − q</div>
        <div class="example-box"><div class="ex-label">Beispiel: x² − 8x = −15 &nbsp; | +15</div>
          x² − 8x + 15 = 0 &nbsp; → &nbsp; p = −8, q = 15<br>
          D = (−8/2)² − 15 = 16 − 15 = <span class="green">1</span><br>
          x₁ = 4 + 1 = 5 &nbsp;&nbsp; x₂ = 4 − 1 = 3<br>
          <span class="green">L = {3 ; 5}</span>
        </div>` },
      { label:"abc-Formel (Fall 4 – a ≠ 1)", content:`
        <div class="formula-box">x<sub>1,2</sub> = (−b ± √(b² − 4·a·c)) ÷ (2·a)</div>
        <div class="formula-box">Diskriminante: D = b² − 4·a·c</div>
        <div class="example-box"><div class="ex-label">Beispiel: 2x² − 11x + 14 = 0</div>
          a = 2, b = −11, c = 14<br>
          D = (−11)² − 4·2·14 = 121 − 112 = <span class="green">9</span><br>
          x₁ = (11 + 3) / 4 = 3,5<br>
          x₂ = (11 − 3) / 4 = 2<br>
          <span class="green">L = {2 ; 3,5}</span>
        </div>
        <div class="warn-box">⚠️ b² bedeutet IMMER positiv! (−11)² = +121, nicht −121!</div>` },
      { label:"Diskriminante für Parameter", content:`
        <div class="rule-box">
          D = 0 → genau <b>1 Lösung</b> → D = 0 setzen und nach Parameter auflösen<br>
          D &gt; 0 → <b>2 Lösungen</b><br>
          D &lt; 0 → <b>keine Lösung</b>
        </div>
        <div class="example-box"><div class="ex-label">Beispiel: x² − 6x + 9 = 0</div>
          D = (−6)² − 4·1·9 = 36 − 36 = <span class="green">0</span><br>
          → genau 1 Lösung (Doppellösung)
        </div>
        <div class="example-box"><div class="ex-label">Für welches c hat x² − 10x + c = 0 genau 1 Lösung?</div>
          D = 100 − 4c = 0 → <span class="green">c = 25</span>
        </div>` },
      { label:"Schnittpunkte zweier Funktionen", content:`
        <div class="rule-box">
          1. f(x) = g(x) setzen<br>
          2. Alles auf eine Seite → quadratische Gleichung<br>
          3. Lösen → x-Werte der Schnittpunkte<br>
          4. x in f(x) einsetzen → y-Wert
        </div>
        <div class="example-box"><div class="ex-label">Beispiel: f(x) = x² − 2x − 3, g(x) = −x + 1</div>
          x² − 2x − 3 = −x + 1<br>
          x² − x − 4 = 0 &nbsp; → &nbsp; Casio oder p/q<br>
          x₁ = (1 + √17)/2 ≈ 2,56 &nbsp;&nbsp; x₂ ≈ −1,56
        </div>
        <div class="casio-box">Casio: solve(x²−2x−3 = −x+1, x) → EXE</div>` },
    ]
  },
  textaufgaben: {
    title: "Textaufgaben",
    sections: [
      { label:"Schema für alle Textaufgaben", content:`
        <div class="rule-box">
          1. Was ist x? Was ist f(x)? (mit Einheiten!)<br>
          2. Tabelle: <b>Angabe | Bedingung | Gleichung</b><br>
          3. Casio Mathe1 → 4735 → a, b, c<br>
          4. Frage beantworten<br>
          5. <b>Einheit + Antwortsatz!</b>
        </div>` },
      { label:"Flugbahn / Kugelstoßen", content:`
        <div class="rule-box">
          • Abstoßhöhe: <b>c direkt ablesen</b> (f(0) = c)<br>
          • Wurfweite: solve(h(x) = 0, x) → größere Lösung<br>
          • Max. Höhe: Scheitelpunkt → x<sub>S</sub> = −b/(2a), dann f(x<sub>S</sub>)<br>
          • Höhe bei x: f(x) einsetzen
        </div>
        <div class="example-box"><div class="ex-label">Kugelstoßen: h(x) = −0,06x² + 0,9x + 2,1</div>
          Abstoßhöhe: c = <span class="green">2,1 m</span> (direkt ablesen!)<br>
          Wurfweite: solve(h(x)=0) → x₂ ≈ <span class="green">17,05 m</span><br>
          Max. Höhe: x<sub>S</sub> = −0,9/(2·(−0,06)) = 7,5 m<br>
          h(7,5) = <span class="green">5,475 m</span>
        </div>
        <div class="casio-box">Define h(x) = −0,06x²+0,9x+2,1<br>→ solve(h(x)=0,x) → x₁≈−2,05 (ungültig!), x₂≈17,05<br>→ h(7,5) → 5,475</div>` },
      { label:"Brückenbogen (aus 3 Punkten aufstellen)", content:`
        <div class="rule-box">
          Ursprung im linken Sockel:<br>
          A(0|0) → c = 0<br>
          S(Spannweite/2 | Höhe) → 1 Gleichung<br>
          B(Spannweite|0) → 1 Gleichung<br>
          → Casio Mathe1 → 4735
        </div>
        <div class="example-box"><div class="ex-label">Brücke: Höhe 40m, Spannweite 120m</div>
          A(0|0): c = 0<br>
          S(60|40): 3600a + 60b + c = 40<br>
          B(120|0): 14400a + 120b + c = 0<br>
          → a ≈ −0,011, b ≈ 1,333, c = 0<br>
          Stütze bei x=30: h(30) = <span class="green">−0,011·900 + 1,333·30 ≈ 30m</span>
        </div>` },
      { label:"Leuchtrakete / Fallbewegung", content:`
        <div class="rule-box">
          Abschusshöhe: c (f(0) = c)<br>

let state = { screen:"menu", topic:null, questions:[], currentQ:0, results:[], answered:false };
const app = document.getElementById("app");

function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function score(){ return state.results.filter(Boolean).length; }
function pct(){ return state.questions.length?Math.round(score()/state.questions.length*100):0; }
function grade(p){ return p>=90?{g:"Sehr gut 🏆",c:"#2a6e4e"}:p>=75?{g:"Gut 💪",c:"#3a8e5a"}:p>=60?{g:"Befriedigend 📖",c:"#8e8a2a"}:p>=50?{g:"Genügend ⚠️",c:"#c49a2a"}:{g:"Nicht Genügend 🔁",c:"#c44"}; }

function startTopic(t) {
  state.topic = t;
  if(t.theory) { state.screen="theory"; app.scrollTop=0; }
  else { state.questions = t.mixed ? getMixed() : shuffle(Q[t.quiz]||[]); state.currentQ=0; state.results=[]; state.answered=false; state.screen="quiz"; }
  render();
}

function render() {
  window.scrollTo(0,0);
  if(state.screen==="menu") renderMenu();
  else if(state.screen==="theory") renderTheory();
  else if(state.screen==="quiz") renderQuiz();
  else if(state.screen==="result") renderResult();
}

}

function renderTheory() {
  const th = THEORY[state.topic.theory];
  let h = `<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
    <button class="btn btn-outline" style="padding:8px 14px" onclick="goMenu()">← Menü</button>
    <div style="font-weight:800;font-size:1.05em">${th.title}</div></div>`;
  h += `<div class="theory-card">`;
  th.sections.forEach(s => {
    h += `<div class="theory-section"><div class="theory-label">${s.label}</div>${s.content}</div>`;
  });
  h += `</div>`;
  // Quiz starten Button für passendes Quiz
  const quizTopic = TOPICS.find(t => t.quiz && state.topic.theory && (
    (state.topic.theory==='potenz' && t.quiz==='potenz') ||
    (state.topic.theory==='quadr_fkt' && t.quiz==='aufstellen') ||
    (state.topic.theory==='gleichungen' && t.quiz==='gleichungen') ||
    (state.topic.theory==='textaufgaben' && t.quiz==='textaufgaben') ||
    (state.topic.theory==='trig' && t.quiz==='trig')
  ));
  if(quizTopic) {
    h += `<button class="btn btn-primary btn-full" style="margin-top:12px" onclick="startTopic(TOPICS[${TOPICS.indexOf(quizTopic)}])">✏️ Quiz zu diesem Thema starten</button>`;
  }
  app.innerHTML = h;
}

function renderQuiz() {
  const q = state.questions[state.currentQ];
  const n = state.questions.length;
  const p = Math.round((state.currentQ/n)*100);
  const col = state.topic.color||'#2a4a6e';

  let h = `<div class="quiz-header">
    <button class="quiz-back btn" onclick="goMenu()">←</button>
    <div class="quiz-info"><div class="quiz-topic">${state.topic.label.replace(/[📖✏️🔥]/g,'').trim()}</div>
    <div class="quiz-progress-text">Frage ${state.currentQ+1} von ${n}</div></div>
    <div class="quiz-score">${score()}/${state.currentQ}</div></div>
  <div class="progress-bar"><div class="progress-fill" style="width:${p}%;background:${col}"></div></div>`;

  h += `<div class="q-card">`;
  if(q.type==='mc') h += renderMC(q);
  else if(q.type==='calc') h += renderCalc(q);
  h += `</div>`;

  if(state.answered) {
    h += `<button class="btn btn-primary btn-full" style="margin-top:12px" onclick="nextQ()">${state.currentQ<n-1?'Weiter →':'Ergebnis anzeigen'}</button>`;
  }
  app.innerHTML = h;
}

function renderMC(q) {
  let h = `<div class="q-text">${q.q}</div><div class="mc-opts">`;
  const letters = ['A','B','C','D'];
  q.opts.forEach((o,i) => {
    h += `<button class="mc-opt" id="mc${i}" onclick="checkMC(${i})" ${state.answered?'disabled':''}><span class="mc-letter">${letters[i]}</span>${o}</button>`;
  });
  h += `</div><div id="mc-feedback"></div>`;
  return h;
}

function checkMC(sel) {
  const q = state.questions[state.currentQ];
  const ok = sel === q.ans;
  state.results.push(ok);
  state.answered = true;
  document.querySelectorAll('.mc-opt').forEach((el,i) => {
    el.disabled = true;
    if(i===q.ans) el.className='mc-opt correct';
    else if(i===sel && !ok) el.className='mc-opt wrong';
    else el.className='mc-opt';
  });
  document.getElementById('mc-feedback').innerHTML =
    `<div class="feedback ${ok?'ok':'err'}"><strong style="color:${ok?'var(--ok)':'var(--err)'}">${ok?'✓ Richtig!':'✗ Falsch!'}</strong><div class="expl">${q.expl}</div></div>`;
  render();
}

function renderCalc(q) {
  let h = `<div class="q-text">${q.q}</div>`;
  h += `<div class="calc-row"><span style="font-weight:700">Antwort =</span>
    <input type="number" step="any" class="calc-input" id="calc-in" placeholder="Zahl…" onkeydown="if(event.key==='Enter')checkCalc()">
    <button class="btn btn-primary" id="calc-btn" onclick="checkCalc()" disabled>Prüfen</button></div>`;
  h += `<div id="calc-feedback"></div>`;
  setTimeout(()=>{ const i=document.getElementById('calc-in'); if(i) i.addEventListener('input',()=>{ document.getElementById('calc-btn').disabled=!i.value; }); },50);
  return h;
}

function checkCalc() {
  const q = state.questions[state.currentQ];
  const inp = document.getElementById('calc-in');
  const v = parseFloat(inp.value.replace(',','.'));
  const ok = !isNaN(v) && Math.abs(v-q.answer)<=(q.tolerance||0.01);
  state.results.push(ok);
  state.answered = true;
  inp.disabled = true;
  inp.className = 'calc-input '+(ok?'correct':'wrong');
  document.getElementById('calc-btn').style.display='none';
  document.getElementById('calc-feedback').innerHTML =
    `<div class="feedback ${ok?'ok':'err'}"><strong style="color:${ok?'var(--ok)':'var(--err)'}">${ok?'✓ Richtig!':'✗ Falsch! Richtig: '+q.answer}</strong><div class="expl">${q.expl}</div></div>`;
  render();
}

function nextQ() {
  if(state.currentQ < state.questions.length-1) { state.currentQ++; state.answered=false; }
  else { state.screen='result'; }
  render();
}

function goMenu() { state.screen='menu'; render(); }

function renderResult() {
  const p = pct(), g = grade(p), sc = score(), tot = state.questions.length;
  let h = `<div class="result-card">
    <div style="font-size:2.8em">${p>=90?'🏆':p>=75?'💪':p>=60?'📖':p>=50?'⚠️':'🔁'}</div>
    <div class="result-grade" style="color:${g.c}">${g.g}</div>
    <div class="result-pct">${p}%</div>
    <div class="result-sub">${sc} von ${tot} richtig</div>
    <div class="result-bar"><div class="result-bar-fill" style="width:${p}%;background:${g.c}"></div></div>
    <div class="result-dots">`;
  state.results.forEach((r,i) => { h += `<div class="result-dot ${r?'ok':'err'}">${i+1}</div>`; });
  h += `</div></div>`;
  if(p < 90) {
    const tip = p<50?'📚 Lies nochmal die Theorie durch!':p<75?'📖 Schau dir die Erklärungen bei den falschen Antworten an!':'💪 Fast! Noch ein Durchgang und die 1 ist sicher!';
    h += `<div class="tip-box">${tip}</div>`;
  } else {
    h += `<div class="tip-box" style="border-color:#2a6e4e;background:#e8f5ed;color:#2a6e4e">🎉 Ausgezeichnet! Du bist bereit für die Schularbeit!</div>`;
  }
  h += `<div class="result-btns"><button class="btn btn-primary" onclick="retry()">🔁 Nochmal</button><button class="btn btn-outline" onclick="goMenu()">← Menü</button></div>`;
  app.innerHTML = h;
}

function retry() {
  state.questions = state.topic.mixed ? getMixed() : shuffle(Q[state.topic.quiz]||[]);
  state.currentQ=0; state.results=[]; state.answered=false; state.screen='quiz';
  render();
}

render();
</script>
</body>
</html>
